services:
  - type: static
    name: teambanks-landing
    env: static
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        headers:
          - key: Content-Security-Policy
            value: "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://unpkg.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self';"
          - key: Strict-Transport-Security
            value: max-age=31536000; includeSubDomains; preload
          - key: X-Frame-Options
            value: DENY
          - key: X-Content-Type-Options
            value: nosniff